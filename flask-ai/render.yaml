services:
  - type: web
    name: fitness-ai-service
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PORT
        value: 10000
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGIN
        fromEnv: FRONTEND_URL
    healthCheckPath: /api/health
    autoDeploy: true